<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Showcase — OHS Art Club</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --navy: #0e1b35; --navy-mid: #162244;
  --parchment: #f7f2eb; --parchment-dark: #ede5d8; --warm-white: #faf8f5;
  --gold: #b8873a; --gold-light: #d4a85c; --gold-pale: #f0ddb8;
  --ink: #1a1612; --ink-mid: #3d3530; --ink-soft: #7a6f66; --ink-faint: #b5aca3;
  --border: rgba(26,22,18,0.1); --border-strong: rgba(26,22,18,0.18);
}
html { scroll-behavior: smooth; }
body { background: var(--warm-white); color: var(--ink); font-family: 'DM Sans', sans-serif; font-weight: 300; overflow-x: hidden; }

/* NAV */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 4rem; background: rgba(250,248,245,0.93); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--navy); text-decoration: none; font-weight: 400; }
.nav-links { display: flex; gap: 2.5rem; list-style: none; }
.nav-links a { font-size: 0.75rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-soft); text-decoration: none; transition: color 0.25s; }
.nav-links a:hover { color: var(--ink); }
.nav-back { display: flex; align-items: center; gap: 0.5rem; font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft); text-decoration: none; transition: color 0.25s; }
.nav-back:hover { color: var(--gold); }
.nav-back::before { content: '←'; font-size: 0.9rem; }
@media (max-width: 640px) { nav { padding: 1rem 1.5rem; } .nav-links { display: none; } }

/* HERO */
.showcase-hero { min-height: 100vh; position: relative; display: flex; align-items: center; background: var(--parchment); overflow: hidden; padding-top: 80px; }
.hero-img-fill { position: absolute; inset: 0; }
.hero-img-fill img { width: 100%; height: 100%; object-fit: cover; display: block; }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(247,242,235,0.96) 40%, rgba(247,242,235,0.6) 75%, rgba(247,242,235,0.2) 100%); }
.hero-content { position: relative; z-index: 2; padding: 4rem 4rem; max-width: 700px; }
@media (max-width: 640px) { .hero-content { padding: 2.5rem 1.5rem; } }
.hero-back { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); text-decoration: none; margin-bottom: 2rem; transition: gap 0.22s; }
.hero-back:hover { gap: 0.8rem; }
.hero-back::before { content: '←'; }
.hero-eyebrow { font-size: 0.65rem; letter-spacing: 0.38em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem; animation: fadeUp 0.85s ease both; }
.hero-eyebrow::before { content:''; display:inline-block; width:28px; height:1px; background:var(--gold); }
.hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 9vw, 7rem); font-weight: 300; line-height: 0.9; letter-spacing: -0.01em; color: var(--navy); margin-bottom: 0.6rem; animation: fadeUp 0.85s 0.1s ease both; }
.hero-title em { font-style: italic; color: var(--ink-mid); display: block; }
.hero-desc { font-size: 0.92rem; line-height: 1.85; color: var(--ink-soft); max-width: 44ch; margin: 1.4rem 0 2rem; animation: fadeUp 0.85s 0.22s ease both; }
.hero-meta { display: flex; align-items: center; gap: 1.8rem; flex-wrap: wrap; animation: fadeUp 0.85s 0.32s ease both; margin-bottom: 2.5rem; }
.meta-pill { font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); display: flex; align-items: center; gap: 0.5rem; }
.meta-pill::before { content:''; display:inline-block; width:4px; height:4px; border-radius:50%; background:var(--gold); flex-shrink:0; }
.torn-bottom { position: absolute; left: -2px; right: -2px; bottom: -1px; z-index: 3; pointer-events: none; }

/* ARTIST CHIPS ROW */
.artists-row { animation: fadeUp 0.85s 0.42s ease both; display: flex; flex-wrap: wrap; gap: 0.5rem; }
.a-chip { font-size: 0.66rem; letter-spacing: 0.1em; padding: 0.28rem 0.8rem; border: 1px solid var(--border-strong); color: var(--ink-mid); font-family: 'DM Sans', sans-serif; transition: border-color 0.2s, color 0.2s; }
.a-chip:hover { border-color: var(--gold); color: var(--gold); }

/* SECTIONS */
section { padding: 5rem 4rem; }
@media (max-width: 768px) { section { padding: 3.5rem 1.5rem; } }
.section-label { font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
.section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem,5vw,3.6rem); font-weight: 300; line-height: 1.06; color: var(--navy); margin-bottom: 1.2rem; }
.section-title em { font-style: italic; color: var(--ink-mid); }
.divider-line { width: 44px; height: 1px; background: var(--gold); margin-bottom: 2.5rem; }

/* MASONRY GALLERY */
.gallery-section { background: var(#fff); }
.gallery-inner { max-width: 1200px; margin: 0 auto; }
.gallery-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem; }
.masonry { columns: 3 260px; column-gap: 3px; }
.m-item { break-inside: avoid; margin-bottom: 3px; position: relative; overflow: hidden; cursor: pointer; background: var(--parchment-dark); }
.m-item img { display: block; width: 100%; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); }
.m-item:hover img { transform: scale(1.045); }
.m-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(14,27,53,0.88) 0%, transparent 52%); opacity: 0; transition: opacity 0.3s; display: flex; flex-direction: column; justify-content: flex-end; padding: 1.4rem; }
.m-item:hover .m-overlay { opacity: 1; }
.m-title { font-family: 'Cormorant Garamond', serif; font-size: 1.12rem; color: var(--parchment); margin-bottom: 0.15rem; }
.m-sub { font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold-pale); }
@media (hover: none) { .m-overlay { opacity: 1; } }

/* LIGHTBOX */
.lightbox { position: fixed; inset: 0; z-index: 1000; background: rgba(14,27,53,0.94); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; backdrop-filter: blur(8px); }
.lightbox.open { opacity: 1; pointer-events: all; }
.lb-inner { position: relative; max-width: min(88vw, 1050px); max-height: 90vh; display: flex; flex-direction: column; align-items: center; transform: scale(0.95) translateY(14px); transition: transform 0.38s cubic-bezier(0.4,0,0.2,1); }
.lightbox.open .lb-inner { transform: scale(1) translateY(0); }
.lb-img { max-width: 100%; max-height: 72vh; object-fit: contain; display: block; }
.lb-info { margin-top: 1.5rem; width: 100%; padding-top: 1.2rem; border-top: 1px solid rgba(184,135,58,0.25); display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
.lb-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 300; color: var(--parchment); margin-bottom: 0.2rem; }
.lb-sub { font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(240,221,184,0.52); }
.lb-counter { font-family: 'Cormorant Garamond', serif; font-size: 0.9rem; color: rgba(240,221,184,0.38); align-self: flex-end; white-space: nowrap; }
.lb-close { position: fixed; top: 1.4rem; right: 1.4rem; width: 42px; height: 42px; border: 1px solid rgba(184,135,58,0.35); background: rgba(14,27,53,0.65); color: var(--parchment); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.22s; backdrop-filter: blur(4px); }
.lb-close:hover { background: var(--gold); border-color: var(--gold); }
.lb-nav { position: fixed; top: 50%; transform: translateY(-50%); width: 46px; height: 46px; border: 1px solid rgba(184,135,58,0.25); background: rgba(14,27,53,0.55); color: var(--parchment); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.22s; backdrop-filter: blur(4px); }
.lb-nav:hover { background: var(--gold); border-color: var(--gold); }
.lb-prev { left: 1.2rem; }
.lb-next { right: 1.2rem; }

/* FOOTER */
footer { border-top: 1px solid var(--border); padding: 2rem 4rem; display: flex; align-items: center; justify-content: space-between; background: var(--warm-white); flex-wrap: wrap; gap: 0.75rem; }
.footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink); }
.footer-copy { font-size: 0.7rem; letter-spacing: 0.08em; color: var(--ink-faint); }
@media (max-width: 640px) { footer { padding: 1.5rem; flex-direction: column; align-items: flex-start; } }

/* DARK MODE */
body.dark {
  --navy: #c8d8f0; --navy-mid: #a8bedd;
  --parchment: #0d1525; --parchment-dark: #111c30; --warm-white: #0a1020;
  --ink: #dce8f8; --ink-mid: #a8bedd; --ink-soft: #6880a8; --ink-faint: #374d6e;
  --border: rgba(180,210,255,0.08); --border-strong: rgba(180,210,255,0.14);
}
body.dark { background: var(--warm-white); color: var(--ink); }
body.dark nav { background: rgba(10,16,32,0.95); }
body.dark .stat-cell, body.dark .artist-card { background: #111c30; }
body.dark .showcase-hero { background: var(--parchment); }
body.dark .hero-overlay { background: linear-gradient(to right, rgba(13,21,37,0.97) 40%, rgba(13,21,37,0.7) 75%, rgba(13,21,37,0.2) 100%); }
body.dark .torn-bottom path { fill: var(--warm-white); }
body.dark footer { background: var(--warm-white); }
body.dark .gallery-section { background: var(--parchment); }
body.dark .artists-section { background: var(--warm-white); }

.dark-toggle { background: none; border: 1px solid var(--border-strong); color: var(--ink-soft); cursor: pointer; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; transition: border-color 0.25s, color 0.25s; flex-shrink: 0; }
.dark-toggle:hover { border-color: var(--gold); color: var(--gold); }
.dark-toggle svg { width: 15px; height: 15px; }
.dark-toggle .icon-moon { display: block; }
.dark-toggle .icon-sun  { display: none; }
body.dark .dark-toggle .icon-moon { display: none; }
body.dark .dark-toggle .icon-sun  { display: block; }

/* ANIMATIONS */
@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
.reveal { opacity:0; transform:translateY(26px); transition: opacity 0.75s ease, transform 0.75s ease; }
.reveal.visible { opacity:1; transform:none; }
.reveal-delay-1 { transition-delay:0.12s; }
.reveal-delay-2 { transition-delay:0.24s; }
.reveal-delay-3 { transition-delay:0.36s; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">OHS Art Club</a>
  <ul class="nav-links">
    <li><a href="https://daphne-f.github.io/OHS-Art-Club/gallery/#archive" class="nav-back">Back to Gallery</a></li>
  </ul>
  <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icon-sun"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
</nav>

<!-- HERO -->
<section class="showcase-hero" id="top">
  <div class="hero-img-fill">
    <!-- Replace with your showcase hero image -->
    <img src="your-hero-image.jpg" alt="Showcase hero" />
  </div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="hero-eyebrow">Season/Year</p>
    <h1 class="hero-title">
      Showcase Name
    </h1>
    <p class="hero-desc">Showcase description here. What inspired it, what the theme was, what students submitted, etc.</p>
    <div class="hero-meta">
      <span class="meta-pill">## Artists</span>
      <span class="meta-pill">## Submissions</span>
    </div>
  </div>
  <svg class="torn-bottom" viewBox="0 0 1440 70" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,70 L0,45 Q18,37 36,46 Q54,55 72,43 Q90,31 108,43 Q126,55 144,43 Q162,31 180,43 Q198,55 216,43 Q234,31 252,44 Q270,57 288,44 Q306,31 324,44 Q342,57 360,44 Q378,31 396,44 Q414,57 432,44 Q450,31 468,44 Q486,57 504,44 Q522,31 540,45 Q558,59 576,45 Q594,31 612,44 Q630,57 648,44 Q666,31 684,44 Q702,57 720,44 Q738,31 756,44 Q774,57 792,44 Q810,31 828,44 Q846,57 864,44 Q882,31 900,44 Q918,57 936,44 Q954,31 972,45 Q990,59 1008,45 Q1026,31 1044,44 Q1062,57 1080,44 Q1098,31 1116,44 Q1134,57 1152,44 Q1170,31 1188,44 Q1206,57 1224,44 Q1242,31 1260,44 Q1278,57 1296,44 Q1314,31 1332,44 Q1350,57 1368,44 Q1386,31 1404,44 Q1422,57 1440,44 L1440,70 Z" fill="#faf8f5"/>
  </svg>
</section>

<!-- GALLERY -->
<section class="gallery-section" id="gallery">
  <div class="gallery-inner">
    <div class="gallery-header">
      <div>
        <p class="section-label reveal">The Work</p>
        <h2 class="section-title reveal reveal-delay-1">All <em>Submissions</em></h2>
        <div class="divider-line reveal reveal-delay-2"></div>
      </div>
      <span class="reveal" id="countLabel" style="font-size:0.68rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-soft);align-self:flex-end;padding-bottom:0.25rem;"></span>
    </div>
    <div class="masonry" id="masonryGrid"></div>
  </div>
</section>

<footer>
  <span class="footer-logo">OHS Art Club</span>
  <span class="footer-copy">© 2026 Stanford Online High School Art Club. All rights reserved.</span>
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lb-close" id="lbClose">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev">‹</button>
  <button class="lb-nav lb-next" id="lbNext">›</button>
  <div class="lb-inner">
    <img class="lb-img" id="lbImg" src="" alt="" />
    <div class="lb-info">
      <div><div class="lb-title" id="lbTitle"></div><div class="lb-sub" id="lbSub"></div></div>
      <div class="lb-counter" id="lbCounter"></div>
    </div>
  </div>
</div>

<script>
/* ── Artwork data for this showcase ──
   Fill in each entry with the real image path, title, artist, and medium.
   You can add or remove entries freely. */
const artworks = [
  { img:"https://i.ibb.co/bjWZd8LL/place.jpg", title:"Artwork Title", artist:"Artist Name", medium:"Medium", year:"2024" },
  { img:"https://i.ibb.co/bjWZd8LL/place.jpg", title:"Artwork Title", artist:"Artist Name", medium:"Medium", year:"2024" },
  { img:"https://i.ibb.co/bjWZd8LL/place.jpg", title:"Artwork Title", artist:"Artist Name", medium:"Medium", year:"2024" },
  { img:"https://i.ibb.co/bjWZd8LL/place.jpg", title:"Artwork Title", artist:"Artist Name", medium:"Medium", year:"2024" },
  { img:"https://i.ibb.co/bjWZd8LL/place.jpg", title:"Artwork Title", artist:"Artist Name", medium:"Medium", year:"2024" },
  { img:"https://i.ibb.co/bjWZd8LL/place.jpg", title:"Artwork Title", artist:"Artist Name", medium:"Medium", year:"2024" },
];

/* ── Build masonry grid ── */
let visibleArt = [...artworks];

function buildGrid() {
  const grid = document.getElementById('masonryGrid');
  grid.innerHTML = '';
  document.getElementById('countLabel').textContent = artworks.length + ' works';
  artworks.forEach((art, idx) => {
    const el = document.createElement('div');
    el.className = 'm-item';
    el.innerHTML = `
      <img src="${art.img}" alt="${art.title}" loading="lazy" />
      <div class="m-overlay">
        <div class="m-title">${art.title}</div>
        <div class="m-sub">${art.artist} · ${art.medium}</div>
      </div>`;
    el.addEventListener('click', () => openLightbox(idx));
    grid.appendChild(el);
  });
}
buildGrid();

/* ── Lightbox ── */
const lb = document.getElementById('lightbox');
let cur = 0;
function openLightbox(idx) { cur = idx; updateLb(); lb.classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeLightbox() { lb.classList.remove('open'); document.body.style.overflow = ''; }
function updateLb() {
  const a = artworks[cur];
  document.getElementById('lbImg').src = a.img;
  document.getElementById('lbImg').alt = a.title;
  document.getElementById('lbTitle').textContent = a.title;
  document.getElementById('lbSub').textContent = `${a.artist} · ${a.medium} · ${a.year}`;
  document.getElementById('lbCounter').textContent = `${cur + 1} / ${artworks.length}`;
}
document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => { cur = (cur - 1 + artworks.length) % artworks.length; updateLb(); });
document.getElementById('lbNext').addEventListener('click', () => { cur = (cur + 1) % artworks.length; updateLb(); });
lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft')  { cur = (cur - 1 + artworks.length) % artworks.length; updateLb(); }
  if (e.key === 'ArrowRight') { cur = (cur + 1) % artworks.length; updateLb(); }
});

/* ── Scroll reveals ── */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => io.observe(el));

/* ── Dark mode — same logic as all other pages ── */
const DARK_START = 18, DARK_END = 6, LS_KEY = 'ohsArtClub_darkMode';
function isNightTime() { const h = new Date().getHours(); return h >= DARK_START || h < DARK_END; }
function applyDark(on) { document.body.classList.toggle('dark', on); }
function getPreference() { return localStorage.getItem(LS_KEY) || 'auto'; }
function setPreference(v) { localStorage.setItem(LS_KEY, v); }
function resolveMode() { const p = getPreference(); if (p==='dark') return true; if (p==='light') return false; return isNightTime(); }
applyDark(resolveMode());
document.getElementById('darkToggle').addEventListener('click', () => {
  const pref = getPreference();
  const dark = document.body.classList.contains('dark');
  setPreference(pref === 'auto' ? (dark ? 'light' : 'dark') : 'auto');
  applyDark(resolveMode());
});
setInterval(() => { if (getPreference() === 'auto') applyDark(resolveMode()); }, 60000);
</script>
</body>
</html>
